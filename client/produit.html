<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fiche Produit — Tchokos SARL</title>
  <!-- SEO & Social Sharing Metadata -->
  <meta name="description" content="Détails et caractéristiques de votre article de luxe chez Tchokos SARL." />

  <!-- Favicon -->
  <link rel="icon" type="image/webp" href="/images/logo.webp">

  <!-- Font Awesome Icons (loaded async to avoid blocking render) -->
  <link rel="preconnect" href="https://cdnjs.cloudflare.com" crossorigin>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA==" crossorigin="anonymous" referrerpolicy="no-referrer" media="print" onload="this.media='all'">
  <noscript><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"></noscript>

  <!-- Open Graph / Facebook -->
  <meta property="og:type" content="website" />
  <meta property="og:title" content="Fiche Produit — Tchokos SARL" />
  <meta property="og:description" content="Détails et caractéristiques de votre article de luxe chez Tchokos SARL." />
  <meta property="og:image" content="/img/136114b1f4f231a692442ad784463e24.webp" />

  <!-- Twitter -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Fiche Produit — Tchokos SARL" />
  <meta name="twitter:description" content="Détails et caractéristiques de votre article de luxe chez Tchokos SARL." />
  <meta name="twitter:image" content="/img/136114b1f4f231a692442ad784463e24.webp" />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300..700;1,300..700&family=Plus+Jakarta+Sans:ital,wght@0,200..800;1,200..800&display=swap">
  <link rel="stylesheet" href="/client/css/style.css">
  <style>
    .product-detail-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 60px;
      margin-top: 40px;
      margin-bottom: 60px;
    }

    .detail-img-container {
      background-color: #f1f5f9;
      border-radius: var(--radius-lg);
      overflow: hidden;
      aspect-ratio: 1;
      border: 1px solid var(--border-color);
    }

    .detail-img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .detail-info h1 {
      font-size: 2.5rem;
      margin-bottom: 10px;
    }

    .detail-meta {
      display: flex;
      gap: 20px;
      align-items: center;
      margin-bottom: 24px;
      color: var(--text-muted);
      font-size: 0.95rem;
    }

    .detail-price {
      font-size: 2rem;
      font-weight: 700;
      color: var(--primary);
      margin-bottom: 30px;
      font-family: var(--font-display);
    }

    .selector-label {
      font-weight: 600;
      margin-bottom: 8px;
      display: block;
      color: var(--secondary);
    }

    .selector-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 24px;
    }

    .selector-btn {
      padding: 10px 20px;
      border: 1px solid var(--border-color);
      border-radius: var(--radius-md);
      font-weight: 500;
      cursor: pointer;
      transition: var(--transition-fast);
      background-color: var(--white);
    }

    .selector-btn:hover {
      border-color: var(--primary);
      color: var(--primary);
    }

    .selector-btn.active {
      background-color: var(--primary);
      color: var(--white);
      border-color: var(--primary);
      box-shadow: 0 4px 10px rgba(217, 119, 6, 0.2);
    }

    .stock-indicator {
      display: flex;
      align-items: center;
      gap: 8px;
      font-weight: 500;
      margin-bottom: 30px;
    }

    .stock-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
    }

    .stock-dot.in-stock { background-color: var(--success); }
    .stock-dot.low-stock { background-color: var(--warning); }
    .stock-dot.out-of-stock { background-color: var(--error); }

    .qty-selector {
      display: inline-flex;
      align-items: center;
      border: 1px solid var(--border-color);
      border-radius: var(--radius-md);
      overflow: hidden;
      margin-right: 20px;
      background-color: var(--white);
    }

    .qty-btn {
      padding: 12px 20px;
      cursor: pointer;
      font-weight: bold;
      transition: var(--transition-fast);
    }

    .qty-btn:hover {
      background-color: var(--light-bg);
    }

    .qty-input {
      width: 50px;
      text-align: center;
      font-weight: 600;
    }

    @media (max-width: 900px) {
      .product-detail-grid {
        grid-template-columns: 1fr;
        gap: 30px;
      }
    }
  </style>
</head>
<body>

  <!-- Dynamic Header -->
  <header></header>

  <main class="container">
    <div id="product-details-container">
      <p style="text-align: center; padding: 100px 0; color: var(--text-muted);">Chargement du produit...</p>
    </div>
  </main>

  <!-- Dynamic Footer -->
  <footer></footer>

  <script type="module" src="/client/js/ui.js"></script>
  <script type="module">
    import { supabase } from '/client/js/supabaseClient.js'
    import { ajouterAuPanier } from '/client/js/panier.js'

    let product = null
    let variants = []
    let selectedSize = null
    let selectedColor = null
    let currentVariant = null
    let qty = 1

    async function loadProductDetail() {
      const container = document.getElementById('product-details-container')
      const urlParams = new URLSearchParams(window.location.search)
      const slug = urlParams.get('slug')

      if (!slug) {
        container.innerHTML = '<p style="text-align: center; padding: 100px 0; color: var(--error);">Produit introuvable (aucun slug fourni).</p>'
        return
      }

      try {
        // Fetch product and categories
        const { data: prod, error: prodErr } = await supabase
          .from('products')
          .select('*, categories(name)')
          .eq('slug', slug)
          .eq('status', 'published')
          .single()

        if (prodErr || !prod) throw prodErr || new Error('Product not found')
        product = prod

        // Fetch variants
        const { data: vars, error: varsErr } = await supabase
          .from('product_variants')
          .select('*')
          .eq('product_id', product.id)

        if (varsErr) throw varsErr
        variants = vars

        // Initial rendering
        renderProduct()
      } catch (err) {
        console.error('Erreur chargement produit:', err)
        container.innerHTML = '<p style="text-align: center; padding: 100px 0; color: var(--error);">Impossible de charger la fiche produit.</p>'
      }
    }

    function renderProduct() {
      const container = document.getElementById('product-details-container')

      // Extract unique sizes and colors
      const sizes = [...new Set(variants.map(v => v.size).filter(Boolean))]
      const colors = [...new Set(variants.map(v => v.color).filter(Boolean))]

      // Default selections if available
      if (sizes.length > 0 && !selectedSize) selectedSize = sizes[0]
      if (colors.length > 0 && !selectedColor) selectedColor = colors[0]

      updateSelectedVariant()

      container.innerHTML = `
        <div class="product-detail-grid">
          <!-- Image -->
          <div class="detail-img-container">
            <img class="detail-img" src="${product.main_image_url || 'https://images.unsplash.com/photo-1549298916-b41d501d3772?w=800&auto=format&fit=crop&q=80'}" alt="${product.name}">
          </div>

          <!-- Info & Config -->
          <div class="detail-info">
            <div class="detail-meta">
              <span>Référence : <strong>${product.reference}</strong></span>
              <span>•</span>
              <span>Catégorie : <strong>${product.categories?.name || 'Général'}</strong></span>
            </div>
            <h1>${product.name}</h1>
            
            <div class="detail-price" id="variant-price">
              ${Number(currentVariant?.price_override || product.price_retail).toLocaleString('fr-FR')} FCFA
            </div>

            <p style="color: var(--text-muted); margin-bottom: 40px; font-size: 1.05rem;">
              ${product.description || "Aucune description fournie pour cet article."}
            </p>

            <!-- Size Selector -->
            ${sizes.length > 0 ? `
              <span class="selector-label">Taille / Pointure</span>
              <div class="selector-grid">
                ${sizes.map(size => `
                  <button class="selector-btn size-btn ${selectedSize === size ? 'active' : ''}" data-size="${size}">${size}</button>
                `).join('')}
              </div>
            ` : ''}

            <!-- Color Selector -->
            ${colors.length > 0 ? `
              <span class="selector-label">Couleur</span>
              <div class="selector-grid">
                ${colors.map(color => `
                  <button class="selector-btn color-btn ${selectedColor === color ? 'active' : ''}" data-color="${color}">${color}</button>
                `).join('')}
              </div>
            ` : ''}

            <!-- Stock Indicator -->
            <div class="stock-indicator" id="stock-indicator-container">
              <!-- Dynamically rendered -->
            </div>

            <!-- Actions -->
            <div class="flex-center" style="justify-content: flex-start;">
              <div class="qty-selector">
                <button class="qty-btn" id="qty-minus">-</button>
                <input type="text" class="qty-input" id="qty-input" value="1" readonly>
                <button class="qty-btn" id="qty-plus">+</button>
              </div>
              <button class="btn btn-primary" id="add-to-cart-btn" style="flex-grow: 1;">
                <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24" style="margin-right: 8px;"><path d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z"></path></svg>
                Ajouter au panier
              </button>
            </div>
          </div>
        </div>
      `;

      setupEventListeners()
      updateStockUI()
    }

    function updateSelectedVariant() {
      if (variants.length === 0) {
        currentVariant = null
        return
      }
      
      // Try to find variant with matching size and color
      currentVariant = variants.find(v => 
        (!selectedSize || v.size === selectedSize) && 
        (!selectedColor || v.color === selectedColor)
      )

      // Fallback if combination doesn't exist
      if (!currentVariant && variants.length > 0) {
        currentVariant = variants[0]
      }
    }

    function updateStockUI() {
      const container = document.getElementById('stock-indicator-container')
      const btn = document.getElementById('add-to-cart-btn')
      if (!container) return

      if (!currentVariant) {
        container.innerHTML = `
          <div class="stock-dot out-of-stock"></div>
          <span style="color: var(--error)">Indisponible</span>
        `
        if (btn) btn.disabled = true
        return
      }

      const stock = currentVariant.stock_qty

      if (stock > 10) {
        container.innerHTML = `
          <div class="stock-dot in-stock"></div>
          <span style="color: var(--success)">En stock (${stock} disponibles)</span>
        `
        if (btn) btn.disabled = false
      } else if (stock > 0) {
        container.innerHTML = `
          <div class="stock-dot low-stock"></div>
          <span style="color: var(--warning)">Stock limité (plus que ${stock} disponibles)</span>
        `
        if (btn) btn.disabled = false
      } else {
        container.innerHTML = `
          <div class="stock-dot out-of-stock"></div>
          <span style="color: var(--error)">Rupture de stock</span>
        `
        if (btn) btn.disabled = true
      }
    }

    function setupEventListeners() {
      // Size selection
      document.querySelectorAll('.size-btn').forEach(btn => {
        btn.addEventListener('click', (e) => {
          selectedSize = e.target.dataset.size
          renderProduct()
        })
      })

      // Color selection
      document.querySelectorAll('.color-btn').forEach(btn => {
        btn.addEventListener('click', (e) => {
          selectedColor = e.target.dataset.color
          renderProduct()
        })
      })

      // Qty actions
      const qtyInput = document.getElementById('qty-input')
      const minusBtn = document.getElementById('qty-minus')
      const plusBtn = document.getElementById('qty-plus')

      if (minusBtn && plusBtn && qtyInput) {
        minusBtn.addEventListener('click', () => {
          if (qty > 1) {
            qty--
            qtyInput.value = qty
          }
        })

        plusBtn.addEventListener('click', () => {
          if (!currentVariant) return
          if (qty < currentVariant.stock_qty) {
            qty++
            qtyInput.value = qty
          }
        })
      }

      // Add to cart
      const addBtn = document.getElementById('add-to-cart-btn')
      if (addBtn) {
        addBtn.addEventListener('click', () => {
          if (!currentVariant) return
          const success = ajouterAuPanier(product, currentVariant, qty)
          if (success) {
            // Flash feedback
            addBtn.innerHTML = 'Article ajouté !'
            addBtn.style.backgroundColor = 'var(--success)'
            addBtn.style.borderColor = 'var(--success)'
            setTimeout(() => {
              addBtn.innerHTML = `
                <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24" style="margin-right: 8px;"><path d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z"></path></svg>
                Ajouter au panier
              `
              addBtn.style.backgroundColor = ''
              addBtn.style.borderColor = ''
            }, 2000)
          }
        })
      }
    }

    document.addEventListener('DOMContentLoaded', loadProductDetail)
  </script>
</body>
</html>
